name: Test

on:
  push:
    paths:
      - 'src/**'
      - 'package-lock.json'
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck
      - run: npm run test:ci
      - run: npm run build
